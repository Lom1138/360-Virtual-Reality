<!DOCTYPE html>
<html>
<head>
	<title>Donington Park - Interactive Exhibition</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<!-- Preload the Material Icons font file directly so it is fetched immediately  -->
	<!-- rather than only after the browser has parsed the Google Fonts CSS response -->
	<link rel="preload" href="https://fonts.gstatic.com/s/materialicons/v140/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2" as="font" type="font/woff2" crossorigin="anonymous">
	<link rel="icon" type="image/x-icon" href="assets/favicon.svg">
	<style>
		html { height: 100%; }
		body {
			height: 100%;
			overflow: hidden;
			margin: 0; padding: 0;
			font-family: 'Hanken Grotesk', Arial, Helvetica, sans-serif;
			font-size: 16px;
			color: #FFFFFF;
			background-color: #000000;
		}
 
		/* ── Loading overlay ──────────────────────────────────── */
		#tour-loader {
			position: fixed;
			inset: 0;
			z-index: 99999;
			background-color: #242625;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 48px;
			transition: opacity 1s ease-in-out;
		}
 
		@media (prefers-color-scheme: light) {
			#tour-loader { background-color: #eff1ed; }
		}
 
		/* ── Logo ─────────────────────────────────────────────── */
		#loader-logo {
			opacity: 0;
			transform: none;
			animation: loaderFadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
		}

		#loader-logo img {
			display: block;
			width: clamp(240px, 60vw, 440px);
			height: auto;
		}
 
		/* ── Progress bar ─────────────────────────────────────── */
		#loader-progress-wrap {
			width: clamp(240px, 60vw, 440px);
			opacity: 0;
			animation: loaderFadeUp 0.6s ease 0.7s forwards;
		}
 
		#loader-progress-track {
			width: 100%;
			height: 8px;
			background: rgba(128,128,128,0.2);
			border-radius: 8px;
			overflow: hidden;
		}
 
		#loader-progress-fill {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, #699476, #69b576);
			border-radius: 8px;
			transition: width 0.3s ease;
		}
 
		@keyframes loaderFadeUp {
			to { opacity: 1; }
		}
	</style>
</head>
<body>

<script src="tour.js"></script>

<div id="tour-loader">
	<div id="loader-logo">
		<img src="assets/logo.svg" alt="" />
	</div>
	<div id="loader-progress-wrap">
		<div id="loader-progress-track">
			<div id="loader-progress-fill"></div>
		</div>
	</div>
</div>

<div id="krpano-container" style="width:100%;height:100%;">
	<noscript><table style="width:100%;height:100%;"><tr style="vertical-align:middle;text-align:center;"><td>ERROR:<br><br>Javascript not activated<br><br></td></tr></table></noscript>
	<script>
		(function () {
 
			var fill   = document.getElementById('loader-progress-fill');
			var loader = document.getElementById('tour-loader');
 
			var startTime    = Date.now();
			var MIN_DURATION = 2000; // ms — guaranteed minimum loader display time
 
			var simProgress = 0;
			var simTimer = setInterval(function () {
				simProgress = Math.min(simProgress + (Math.random() * 6 + 2), 70);
				fill.style.width = simProgress + '%';
			}, 180);
 
			function dismiss() {
				var elapsed   = Date.now() - startTime;
				var remaining = Math.max(MIN_DURATION - elapsed, 0);
				setTimeout(function () {
					clearInterval(simTimer);
					fill.style.width = '100%';
					// Brief pause at 100% before fading out
					setTimeout(function () {
						loader.style.opacity = '0';
						loader.addEventListener('transitionend', function () {
							loader.style.display = 'none';
						}, { once: true });
					}, 420);
				}, remaining);
			}
 
			// Insert a hidden element that uses Material Icons to force the browser
			// to fully download and decode the font before krpano initialises.
			// document.fonts.load() then waits for that specific font to be paint-ready.
			var primer = document.createElement('span');
			primer.setAttribute('aria-hidden', 'true');
			primer.style.cssText = 'position:absolute;opacity:0;pointer-events:none;font-family:"Material Icons";font-size:24px;';
			primer.textContent = 'check';
			document.body.appendChild(primer);

			function initKrpano() {
				embedpano({
					xml:                 'tour.xml',
					target:              'krpano-container',
					passQueryParameters: 'startscene,startlookat',
					onready:             function () { dismiss(); },
					onerror:             function () { dismiss(); }
				});
			}

			document.fonts.load('24px "Material Icons"').then(function () {
				document.body.removeChild(primer);
				initKrpano();
			}).catch(function () {
				// Font load failed — init anyway so the tour isn't blocked
				initKrpano();
			});

			// Hard fallback — dismiss after 12 s no matter what
			setTimeout(dismiss, 12000);
 
		}());
	</script>
</div>
<script>(()=>{const f=document.querySelector('link[rel="icon"]');if(!f)return;f.href=f.href.split('?')[0]+'?v='+Date.now();window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>f.href=f.href.split('?')[0]+'?v='+Date.now())})();</script>
</body>
</html>
