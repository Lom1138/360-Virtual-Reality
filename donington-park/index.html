<!DOCTYPE html>
<html>
<head>
	<title>Donington Park - Interactive Exhibition</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="preload" href="https://fonts.gstatic.com/s/materialicons/v140/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2" as="font" type="font/woff2" crossorigin="anonymous">
	<link rel="icon" type="image/x-icon" href="assets/favicon.svg">
	<style>
		html { height: 100%; }
		body {
			height: 100%;
			overflow: hidden;
			margin: 0; padding: 0;
			font-family: 'Hanken Grotesk', Arial, Helvetica, sans-serif;
			font-size: 16px;
			color: #FFFFFF;
			background-color: #000000;
		}

		/* ── Loading overlay ──────────────────────────────────── */
		#tour-loader {
			position: fixed;
			inset: 0;
			z-index: 99999;
			background-color: #242625;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 48px;
			transition: opacity 1s ease-in-out;
		}

		@media (prefers-color-scheme: light) {
			#tour-loader { background-color: #eff1ed; }
		}

		/* ── Logo ─────────────────────────────────────────────── */
		#loader-logo {
			opacity: 0;
			transform: none;
			animation: loaderFadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
		}

		#loader-logo img {
			display: block;
			width: clamp(240px, 60vw, 440px);
			height: auto;
		}

		/* ── Progress bar ─────────────────────────────────────── */
		#loader-progress-wrap {
			width: clamp(240px, 60vw, 440px);
			opacity: 0;
			animation: loaderFadeUp 0.6s ease 0.7s forwards;
		}

		#loader-progress-track {
			width: 100%;
			height: 8px;
			background: rgba(128,128,128,0.2);
			border-radius: 8px;
			overflow: hidden;
		}

		#loader-progress-fill {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, #699476, #69b576);
			border-radius: 8px;
			transition: width 0.25s ease;
		}

		@keyframes loaderFadeUp {
			to { opacity: 1; }
		}
	</style>
</head>
<body>

<script src="tour.js"></script>

<div id="tour-loader">
	<div id="loader-logo">
		<img src="assets/logo.svg" alt="" />
	</div>
	<div id="loader-progress-wrap">
		<div id="loader-progress-track">
			<div id="loader-progress-fill"></div>
		</div>
	</div>
</div>

<div id="krpano-container" style="width:100%;height:100%;">
	<noscript><table style="width:100%;height:100%;"><tr style="vertical-align:middle;text-align:center;"><td>ERROR:<br><br>Javascript not activated<br><br></td></tr></table></noscript>
	<script>
	(function () {

		var fill      = document.getElementById('loader-progress-fill');
		var loader    = document.getElementById('tour-loader');
		var startTime = Date.now();
		var MIN_MS    = 2000;

		// ── Progress weighting ─────────────────────────────────────────────────
		// Bar is divided into three real segments. Weights must sum to 100.
		// Music is small so gets 10%, video is large so gets 60%,
		// krpano first-scene ready gets the remaining 30%.
		var W_MUSIC  = 10;
		var W_VIDEO  = 60;
		var W_KRPANO = 30;

		var prog = { music: 0, video: 0, krpano: 0 };

		function updateBar() {
			var total = (prog.music  / 100) * W_MUSIC
			          + (prog.video  / 100) * W_VIDEO
			          + (prog.krpano / 100) * W_KRPANO;
			fill.style.width = Math.min(total, 100) + '%';
		}

		// ── Dismiss logic ──────────────────────────────────────────────────────
		var krpanoReady  = false;
		var assetsLoaded = false; // true once both XHR fetches complete
		var dismissed    = false;

		function tryDismiss() {
			if (dismissed)    return;
			if (!krpanoReady) return;
			if (!assetsLoaded) return;

			dismissed = true;
			var elapsed   = Date.now() - startTime;
			var remaining = Math.max(MIN_MS - elapsed, 0);

			setTimeout(function () {
				fill.style.width = '100%';
				setTimeout(function () {
					loader.style.opacity = '0';
					loader.addEventListener('transitionend', function () {
						loader.style.display = 'none';
					}, { once: true });
				}, 420);
			}, remaining);
		}

		// Hard fallback — never block the user for more than 15 s total
		setTimeout(function () {
			krpanoReady  = true;
			assetsLoaded = true;
			tryDismiss();
		}, 15000);

		// ── XHR asset pre-fetch ────────────────────────────────────────────────
		// Downloads assets into blob URLs before krpano needs them, so playback
		// starts instantly with no buffering stall. The blob URLs are stored on
		// window so krpano/soundinterface can reference them if needed, but the
		// primary benefit is that the browser cache is primed regardless.
		function fetchAsset(url, progressKey, onDone) {
			var xhr = new XMLHttpRequest();
			xhr.open('GET', url, true);
			xhr.responseType = 'blob';

			xhr.onprogress = function (e) {
				if (e.lengthComputable) {
					prog[progressKey] = Math.round((e.loaded / e.total) * 100);
					updateBar();
				}
			};

			xhr.onload = function () {
				prog[progressKey] = 100;
				updateBar();
				if (this.status === 200) {
					var blobUrl = URL.createObjectURL(this.response);
					onDone(blobUrl);
				} else {
					onDone(null);
				}
			};

			xhr.onerror = function () {
				prog[progressKey] = 100; // don't leave bar stuck
				updateBar();
				onDone(null);
			};

			xhr.send();
		}

		var musicDone = false;
		var videoDone = false;

		function checkAssetsDone() {
			if (musicDone && videoDone) {
				assetsLoaded = true;
				tryDismiss();
			}
		}

		fetchAsset('assets/music.mp3', 'music', function (blobUrl) {
			if (blobUrl) window._cachedMusicUrl = blobUrl;
			musicDone = true;
			checkAssetsDone();
		});

		fetchAsset('assets/Animation.mp4', 'video', function (blobUrl) {
			if (blobUrl) window._cachedVideoUrl = blobUrl;
			videoDone = true;
			checkAssetsDone();
		});

		// ── Font primer + krpano init ──────────────────────────────────────────
		var primer = document.createElement('span');
		primer.setAttribute('aria-hidden', 'true');
		primer.style.cssText = 'position:absolute;opacity:0;pointer-events:none;font-family:"Material Icons";font-size:24px;';
		primer.textContent = 'check';
		document.body.appendChild(primer);

		function initKrpano() {
			embedpano({
				xml:                 'tour.xml',
				target:              'krpano-container',
				passQueryParameters: 'startscene,startlookat',
				onready: function () {
					prog.krpano = 100;
					updateBar();
					krpanoReady = true;
					tryDismiss();
				},
				onerror: function () {
					prog.krpano = 100;
					updateBar();
					krpanoReady = true;
					tryDismiss();
				}
			});
		}

		document.fonts.load('24px "Material Icons"').then(function () {
			document.body.removeChild(primer);
			initKrpano();
		}).catch(function () {
			initKrpano();
		});

	}());
	</script>
</div>
<script>(()=>{const f=document.querySelector('link[rel="icon"]');f&&window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>f.href=f.href.split('?')[0]+'?v='+Date.now())})();</script>
</body>
</html>
